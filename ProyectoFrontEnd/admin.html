<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDrive | Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-danger sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-shield-fill me-2"></i>AUTODRIVE · Admin
      </a>
      <div class="d-flex gap-2">
        <a href="index.html" class="btn btn-outline-light btn-sm">Ir al sitio</a>
        <button class="btn btn-outline-light btn-sm" id="btn-salir-admin">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <nav class="col-md-2 bg-dark min-vh-100 p-0">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link text-white sidebar-link active" href="#" data-seccion="dashboard">
                <i class="bi bi-grid me-2"></i>Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white sidebar-link" href="#" data-seccion="publicaciones">
                <i class="bi bi-car-front me-2"></i>Publicaciones
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white sidebar-link" href="#" data-seccion="usuarios">
                <i class="bi bi-people me-2"></i>Usuarios
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white sidebar-link" href="#" data-seccion="ventas">
                <i class="bi bi-cash-stack me-2"></i>Ventas
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white sidebar-link" href="#" data-seccion="reportes">
                <i class="bi bi-flag me-2"></i>Reportes
                <span class="badge bg-danger ms-1" id="badge-reportes" style="display:none"></span>
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- CONTENIDO -->
      <main class="col-md-10 px-4 py-4" id="panel-admin">
        <div class="text-center py-5">
          <div class="spinner-border text-danger" role="status"></div>
        </div>
      </main>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
