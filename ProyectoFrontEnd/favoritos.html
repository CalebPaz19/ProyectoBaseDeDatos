<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDrive | Mis Favoritos</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">AUTODRIVE</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="publicar.html">Vender Auto</a></li>
          <li class="nav-item"><a class="nav-link" href="mensajeria.html">Mensajería</a></li>
          <li class="nav-item"><a class="nav-link active" href="favoritos.html">Favoritos</a></li>
        </ul>
        <div id="contenedor-auth" class="d-flex gap-2"></div>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h3 class="fw-bold mb-1"><i class="bi bi-heart-fill text-danger me-2"></i>Mis Favoritos</h3>
    <p class="text-muted mb-4">Vehículos que guardaste para ver después.</p>

    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="contenedor-favoritos">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requiereLogin('favoritos.html')) return;
      const usuario = sesion.obtener();
      const contenedor = document.getElementById('contenedor-favoritos');

      try {
        const data = await apiFavoritos.listar(usuario.id_usuario);
        if (!data.favoritos?.length) {
          contenedor.innerHTML = `
            <div class="col-12 text-center py-5">
              <i class="bi bi-heart display-1 text-muted opacity-25"></i>
              <p class="mt-3 text-muted">No tienes favoritos aún. <a href="catalogo.html">Explora el catálogo →</a></p>
            </div>`;
          return;
        }

        contenedor.innerHTML = data.favoritos.map(f => `
          <div class="col" id="fav-${f.id_favorito}">
            <div class="card h-100 shadow-sm border-0 card-hover">
              <img src="${f.imagen_principal || 'https://via.placeholder.com/400x250?text=Sin+imagen'}"
                   class="card-img-top" style="height:200px;object-fit:cover" alt="${f.titulo}">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <span class="badge ${f.estado === 'activa' ? 'bg-success' : 'bg-secondary'} small">${f.estado}</span>
                  <h6 class="fw-bold text-primary mb-0">$${Number(f.precio).toLocaleString()}</h6>
                </div>
                <h6 class="card-title fw-bold">${f.titulo}</h6>
                <p class="card-text text-muted small">
                  ${f.año} • ${f.marca} ${f.modelo} • ${f.ciudad}
                </p>
                <small class="text-muted">Guardado el ${new Date(f.fecha_agregado).toLocaleDateString('es-HN')}</small>
              </div>
              <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
                <a href="detalle.html?id=${f.id_publicacion}" class="btn btn-outline-dark btn-sm flex-grow-1">Ver Detalles</a>
                <button class="btn btn-outline-danger btn-sm" onclick="quitarFavorito(${usuario.id_usuario}, ${f.id_publicacion}, ${f.id_favorito})" title="Quitar de favoritos">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>`).join('');

      } catch (err) {
        contenedor.innerHTML = `<div class="col-12 text-center text-danger">${err.message}</div>`;
      }
    });

    async function quitarFavorito(id_usuario, id_publicacion, id_favorito) {
      if (!confirm('¿Quitar de favoritos?')) return;
      try {
        await apiFavoritos.eliminar(id_usuario, id_publicacion);
        document.getElementById(`fav-${id_favorito}`)?.remove();
      } catch (err) { alert(err.message); }
    }
  </script>
</body>
</html>
